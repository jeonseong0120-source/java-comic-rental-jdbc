plugins {
    id 'java'
    id 'application'
}

group = 'CLI.project'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'mysql:mysql-connector-java:8.0.33'
}

application {
    mainClass = 'CLI.project.Main'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}